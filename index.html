<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#1A2C5B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Drill BJJ">
<title>Drill BJJ School</title>
<style>
:root{
  --navy:#1A2C5B;--yellow:#F5C518;--yellow2:#ffe066;
  --bg:#0e1a36;--card:#162040;--border:#243a73;
  --text:#f0f0f0;--text2:#b0bcda;--text3:#6a7fa8;
  --topbar:#0a1428;
  --red:#ff6b6b;--red-bg:#2a1020;--red-t:#ffaaaa;
  --amber:#F5C518;--amber-bg:#2a2000;--amber-t:#F5C518;
  --blue:#5b8dee;--blue-bg:#0d1f3c;--blue-t:#93b4f5;
  --green:#4caf50;--green-bg:#0a2010;--green-t:#86e88a;
  --panel-bg:#0e1a36;--modal-bg:#162040;
  --shadow:0 1px 4px rgba(0,0,0,.4);--shadow-md:0 4px 20px rgba(0,0,0,.5);
  --radius:10px;--radius-sm:8px;
}
[data-theme="light"]{
  --bg:#f0f4ff;--card:#fff;--border:#d0d9ef;
  --text:#1a2040;--text2:#3a4a70;--text3:#7a8aaa;
  --topbar:#1A2C5B;
  --red:#dc2626;--red-bg:#fef2f2;--red-t:#991b1b;
  --amber:#b45309;--amber-bg:#fffbeb;--amber-t:#92400e;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-t:#1e40af;
  --green:#16a34a;--green-bg:#f0fdf4;--green-t:#15803d;
  --panel-bg:#f7f9ff;--modal-bg:#fff;
  --shadow:0 1px 3px rgba(26,44,91,.1);--shadow-md:0 4px 12px rgba(26,44,91,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;transition:background .25s,color .25s}
.topbar{background:var(--topbar);border-bottom:2px solid var(--yellow);
  padding:0 1rem;height:56px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-md)}
.logo{display:flex;align-items:center;gap:9px}
.logo img{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--yellow)}
.logo-title{color:var(--yellow);font-weight:700;font-size:15px;line-height:1.2}
.logo-sub{color:rgba(245,197,24,.6);font-size:10px}
.top-right{display:flex;align-items:center;gap:6px}
.icon-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(245,197,24,.3);
  background:transparent;cursor:pointer;font-size:15px;display:flex;align-items:center;
  justify-content:center;color:var(--yellow);transition:all .2s}
.icon-btn:hover{background:rgba(245,197,24,.15)}
.sync-badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;
  display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none}
.s-ok{background:rgba(76,175,80,.25);color:#86e88a}
.s-ing{background:rgba(245,197,24,.2);color:var(--yellow)}
.s-err{background:rgba(255,107,107,.25);color:#fca5a5}
.s-loc{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
.btn-add{background:var(--yellow);color:#0a1428;border:none;padding:7px 12px;
  border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:4px}
.btn-add:hover{background:var(--yellow2)}
.main{max-width:860px;margin:0 auto;padding:1rem 1rem 4rem}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1rem}
.stat{background:var(--card);border-radius:var(--radius);padding:.65rem .5rem;
  text-align:center;box-shadow:var(--shadow);border:1px solid var(--border)}
.stat-val{font-size:20px;font-weight:800;color:var(--yellow)}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:1px}
.stat.s0 .stat-val{color:var(--red)}.stat.s1 .stat-val{color:var(--amber)}
.stat.s2 .stat-val{color:var(--blue)}.stat.s3 .stat-val{color:var(--green)}
.toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:.5rem}
.toolbar2{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:.9rem}
.fbtn{font-size:12px;padding:4px 11px;border-radius:20px;
  border:1.5px solid var(--border);background:var(--card);color:var(--text2);
  cursor:pointer;font-weight:500;transition:all .15s}
.fbtn.on{background:var(--yellow);color:#0a1428;border-color:var(--yellow);font-weight:700}
.sbtn{font-size:11px;padding:3px 9px;border-radius:20px;
  border:1.5px solid var(--border);background:transparent;color:var(--text3);
  cursor:pointer;transition:all .15s}
.sbtn.on{border-color:var(--blue-t);color:var(--blue-t);background:var(--blue-bg)}
.slbl{font-size:11px;color:var(--text3);font-weight:600}
.srch-wrap{margin-left:auto;position:relative}
.srch-wrap svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text3)}
.srch{font-size:12px;padding:5px 9px 5px 27px;border-radius:20px;
  border:1.5px solid var(--border);background:var(--card);color:var(--text);
  width:160px;outline:none}
.srch:focus{border-color:var(--yellow)}
.sc{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);
  margin-bottom:5px;cursor:pointer;box-shadow:var(--shadow);transition:all .15s}
.sc:hover{border-color:var(--text3)}
.sc.open{border-color:var(--yellow);border-bottom-left-radius:0;border-bottom-right-radius:0;margin-bottom:0}
.sc-inner{display:flex;align-items:center;gap:10px;padding:.6rem .85rem}
.av{width:35px;height:35px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.av0{background:var(--red-bg);color:var(--red-t)}.av1{background:var(--amber-bg);color:var(--amber-t)}
.av2{background:var(--blue-bg);color:var(--blue-t)}.av3{background:var(--green-bg);color:var(--green-t)}
.si{flex:1;min-width:0}
.sn{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;border-radius:4px;padding:1px 5px}
.b0{background:var(--red-bg);color:var(--red-t)}.b1{background:var(--amber-bg);color:var(--amber-t)}
.b2{background:var(--blue-bg);color:var(--blue-t)}.b3{background:var(--green-bg);color:var(--green-t)}
.bw{background:var(--amber-bg);color:var(--amber-t)}.bficha{background:var(--green-bg);color:var(--green-t)}
.sd{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dots{display:flex;gap:4px;flex-shrink:0}
.dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:700;
  border:1.5px solid var(--border);background:var(--bg);color:var(--text3)}
.dot.ok{background:var(--green-bg);color:var(--green-t);border-color:#86efac}
.dot.sch{background:var(--blue-bg);color:var(--blue-t);border-color:#93c5fd}
.chv{flex-shrink:0;transition:transform .2s;color:var(--text3)}
.chv.up{transform:rotate(180deg)}
.panel{background:var(--panel-bg);border:1.5px solid var(--yellow);
  border-top:none;border-radius:0 0 var(--radius) var(--radius);
  padding:.9rem 1rem 1rem;margin-bottom:8px}
.pname{font-size:15px;font-weight:800;color:var(--yellow)}
.pinfo{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.75}
.pobs{font-size:11px;background:var(--amber-bg);color:var(--amber-t);
  border-radius:var(--radius-sm);padding:5px 10px;margin-top:6px;
  border-left:3px solid var(--yellow)}
/* FICHA VIEWER */
.ficha-box{background:var(--card);border:1.5px solid var(--green-t);
  border-radius:var(--radius-sm);padding:.8rem;margin-top:.6rem}
.ficha-title{font-size:11px;font-weight:700;color:var(--green-t);
  text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;
  display:flex;align-items:center;gap:5px}
.ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}
.ficha-row{font-size:11px;color:var(--text2);padding:2px 0;
  border-bottom:1px solid var(--border);display:flex;flex-direction:column}
.ficha-lbl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase}
.ficha-val{color:var(--text);font-weight:500}
.alert-box{border-radius:var(--radius-sm);padding:8px 12px;
  font-size:12px;font-weight:700;margin:.7rem 0}
.al0{background:var(--red-bg);color:var(--red-t)}
.al1{background:var(--amber-bg);color:var(--amber-t)}
.al2{background:var(--blue-bg);color:var(--blue-t)}
.al3{background:var(--green-bg);color:var(--green-t)}
.slbl2{font-size:10px;font-weight:700;color:var(--yellow);
  text-transform:uppercase;letter-spacing:.06em;margin:.8rem 0 5px}
.agrid{display:flex;gap:8px;flex-wrap:wrap}
.abox{background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);padding:.6rem;flex:1;min-width:128px}
.at{font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:600}
.inp{font-size:12px;padding:5px 8px;width:100%;margin-bottom:4px;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  background:var(--card);color:var(--text);outline:none}
.inp:focus{border-color:var(--yellow)}
.btn{font-size:12px;padding:5px 10px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--card);color:var(--text);
  cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-weight:600;transition:all .15s}
.btn:hover{background:var(--bg)}
.btn-ok{background:var(--green-bg);border-color:#86efac;color:var(--green-t)}
.btn-del{border-color:var(--red-t);color:var(--red-t);font-size:10px;padding:2px 7px}
.btn-copy{background:var(--yellow);border-color:var(--yellow);color:#0a1428;
  padding:7px 14px;font-size:13px;font-weight:700}
.btn-copy:hover{background:var(--yellow2)}
.btn-copy.copied{background:var(--green);border-color:var(--green);color:#fff}
select{font-size:12px;padding:5px 8px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--card);color:var(--text);
  width:100%;margin-bottom:7px;outline:none}
.msgbox{background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);padding:.85rem;font-size:12px;line-height:1.8;
  white-space:pre-wrap;color:var(--text);max-height:180px;overflow-y:auto;margin-bottom:7px}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px}
.last-sync{text-align:center;padding:.5rem;font-size:11px;color:var(--text3)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--modal-bg);border:1px solid var(--yellow);border-radius:var(--radius);
  padding:1.4rem;width:100%;max-width:460px;box-shadow:var(--shadow-md);
  max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:800;color:var(--yellow);margin-bottom:1rem}
.frow{margin-bottom:.7rem}
.flbl{font-size:11px;font-weight:700;color:var(--text2);
  text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;display:block}
.finp{font-size:13px;padding:8px 10px;width:100%;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg);color:var(--text);outline:none}
.finp:focus{border-color:var(--yellow)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.btn-cancel{padding:8px 16px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:transparent;color:var(--text2);
  cursor:pointer;font-size:13px;font-weight:600}
.btn-save{padding:8px 18px;border-radius:var(--radius-sm);
  background:var(--yellow);border:none;color:#0a1428;cursor:pointer;font-size:13px;font-weight:700}
@media(max-width:520px){
  .stats{grid-template-columns:repeat(3,1fr)}.stat.s2,.stat.s3{display:none}
  .srch{width:110px}.agrid{flex-direction:column}.fgrid{grid-template-columns:1fr}
  .ficha-grid{grid-template-columns:1fr}
}
</style>
</head>

const SL=["🔴 Sem aula","🟡 Após 1ª","🔵 Após 2ª","✅ Pronto p/ matrícula"];
const BC=["b0","b1","b2","b3"],AVC=["av0","av1","av2","av3"];

let students=[],selId=null,filter="all",sortBy="status",msgTypes={},copiedId=null,syncing=false;

// ── THEME ──
function initTheme(){setTheme(localStorage.getItem(LT)||"dark",false);}
function setTheme(t,sv=true){
  document.documentElement.setAttribute("data-theme",t);
  document.getElementById("themeBtn").textContent=t==="dark"?"☀️":"🌙";
  if(sv)localStorage.setItem(LT,t);
}
function toggleTheme(){const c=document.documentElement.getAttribute("data-theme")||"dark";setTheme(c==="dark"?"light":"dark");}

// ── SORT ──
function setSort(s,btn){
  sortBy=s;localStorage.setItem(LS2,s);
  document.querySelectorAll(".sbtn").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");render();
}
function getSorted(arr){
  const a=[...arr];
  if(sortBy==="nome") return a.sort((x,y)=>x.nome.localeCompare(y.nome,"pt-BR"));
  if(sortBy==="data") return a.sort((x,y)=>{
    const p=d=>{if(!d)return"";const[dd,mm,yy]=d.split("/");return(yy||"")+mm+dd;};
    const dx=x.aulas.filter(u=>u.f&&u.d).map(u=>p(u.d)).sort().reverse()[0]||"";
    const dy=y.aulas.filter(u=>u.f&&u.d).map(u=>p(u.d)).sort().reverse()[0]||"";
    return dy>dx?1:dy<dx?-1:0;
  });
  if(sortBy==="recente") return a.reverse();
  return a.sort((x,y)=>stg(y)-stg(x));
}

// ── SYNC ──
function setSyncUI(state){
  const b=document.getElementById("syncBadge"),t=document.getElementById("syncTxt"),d=document.getElementById("syncDot");
  const M={ok:{cls:"s-ok",dot:"✓",txt:"Sincronizado"},ing:{cls:"s-ing",dot:"↻",txt:"Atualizando"},
    err:{cls:"s-err",dot:"✗",txt:"Sem conexão"},loc:{cls:"s-loc",dot:"💾",txt:"Local"}};
  const s=M[state]||M.ok;
  b.className="sync-badge "+s.cls;d.textContent=s.dot;t.textContent=s.txt;
}

async function loadFromSheets(showSpinner=true){
  if(syncing)return; syncing=true;
  if(showSpinner)setSyncUI("ing");
  try{
    const ctrl=new AbortController();
    setTimeout(()=>ctrl.abort(),10000);
    const r=await fetch(SU+"?t="+Date.now(),{mode:"cors",signal:ctrl.signal});
    const data=await r.json();
    if(Array.isArray(data)&&data.length>0){
      const changed=JSON.stringify(data)!==JSON.stringify(students);
      students=data;
      localStorage.setItem(SK,JSON.stringify(students));
      setSyncUI("ok");
      updateLastSync();
      if(changed)render();
    } else if(Array.isArray(data)&&data.length===0){
      // Planilha vazia — sobe dados iniciais
      students=JSON.parse(JSON.stringify(INIT));
      await saveToSheets();
      setSyncUI("ok");
      updateLastSync();
      render();
    } else {
      fallbackLocal();
    }
  }catch(e){fallbackLocal();}
  syncing=false;
}

function fallbackLocal(){
  try{const d=localStorage.getItem(SK);students=d?JSON.parse(d):JSON.parse(JSON.stringify(INIT));}
  catch(e){students=JSON.parse(JSON.stringify(INIT));}
  setSyncUI(students.length>0?"err":"err");
  render();
}

async function saveToSheets(){
  localStorage.setItem(SK,JSON.stringify(students));
  setSyncUI("ing");
  try{
    await fetch(SU,{method:"POST",mode:"no-cors",body:JSON.stringify(students),
      headers:{"Content-Type":"text/plain"}});
    setSyncUI("ok");updateLastSync();
  }catch(e){setSyncUI(students.length>0?"err":"err");}
}

function manualSync(){loadFromSheets(true);}
function updateLastSync(){
  const el=document.getElementById("lastSync");
  if(el)el.textContent="Última atualização: "+new Date().toLocaleString("pt-BR");
}

// Auto-poll a cada 30s
setInterval(()=>{
  if(document.visibilityState==="visible"&&!syncing)loadFromSheets(false);
},30000);
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="visible")loadFromSheets(false);
});

// ── HELPERS ──
const stg=s=>s.aulas.filter(a=>a.f).length;
const ini=n=>n.split(" ").filter(Boolean).slice(0,2).map(x=>x[0]||"").join("").toUpperCase();
const nextId=()=>students.length?Math.max(...students.map(s=>s.id))+1:1;

function buildMsg(s,type){
  const rp=s.resp.split(" ")[0],nm=s.nome.split(" ")[0],left=3-stg(s);
  return {
    agendar:`Olá ${rp}! 😊

Aqui é da Drill BJJ School! Passando para confirmar a aula experimental do(a) *${nm}*. 🥋

Ofertamos *3 aulas experimentais gratuitas* sem compromisso!

Fornecemos o kimono — só bermuda tactel, camiseta e chinelinho. ✅

Qual o melhor horário? 😊`,
    pos1:`Olá ${rp}! 😊

Como foi a *1ª aula* do(a) *${nm}* na Drill BJJ? 🥋

Curtiu? Ainda tem *2 aulas gratuitas* esperando! 🔥

Quando agendamos a próxima? 💪`,
    pos2:`Olá ${rp}! 😊

O(a) *${nm}* está mandando bem! 2 aulas concluídas! 🥋🔥

*Última aula gratuita* vem aí — e já posso te mostrar os planos especiais! 💪😊`,
    pos3:`Parabéns ${rp}! 🎉🥋

O(a) *${nm}* completou as *3 aulas experimentais*!

Hora de garantir a matrícula! 🔥

✅ Mensal · ✅ Trimestral (-10%) · ✅ Semestral · ✅ Anual

Qual encaixa melhor pra vocês? 😊💪`,
    lembrete:`Olá ${rp}! 😊

Lembrando a aula do(a) *${nm}* amanhã na Drill BJJ! 🥋

• Bermuda tactel + camiseta
• Chinelinho fora do tatame
• Kimono é com a gente! 😊

Te esperamos! 💪`,
    followup:`Olá ${rp}! 😊

Com saudades do(a) *${nm}*! 🥋

Ainda tem *${left} aula(s) gratuita(s)* disponível(is)!

As portas estão sempre abertas! 💪😊`
  }[type]||"";}

function setFilter(f,btn){filter=f;selId=null;document.querySelectorAll(".fbtn").forEach(b=>b.classList.remove("on"));btn.classList.add("on");render();}
function getFiltered(){
  const q=(document.getElementById("srchInp")?.value||"").toLowerCase();
  const base=students.filter(s=>{
    const sm=filter==="all"||stg(s)===filter;
    const qm=!q||s.nome.toLowerCase().includes(q)||s.resp.toLowerCase().includes(q);
    return sm&&qm;
  });
  return getSorted(base);
}
function markAula(sid,ai,f,d,h){
  students=students.map(s=>s.id!==sid?s:{...s,aulas:s.aulas.map((a,i)=>i===ai?{...a,f,d,h}:a)});
  saveToSheets();render();
}
function doMark(sid,ai,dk,hk){
  const d=document.getElementById(dk)?.value||"";
  const h=document.getElementById(hk)?.value||"";
  markAula(sid,ai,true,d,h);
}
let cpTO=null;
function copyMsg(sid,type){
  const s=students.find(x=>x.id===sid);if(!s)return;
  const msg=buildMsg(s,type);
  const done=()=>{copiedId=sid;render();if(cpTO)clearTimeout(cpTO);cpTO=setTimeout(()=>{copiedId=null;render();},2500);};
  navigator.clipboard.writeText(msg).then(done).catch(()=>{
    const ta=document.createElement("textarea");ta.value=msg;
    document.body.appendChild(ta);ta.select();document.execCommand("copy");
    document.body.removeChild(ta);done();
  });
}
function openModal(){document.getElementById("modalOverlay").style.display="flex";}
function closeModal(){document.getElementById("modalOverlay").style.display="none";
  ["f-nome","f-idade","f-wp","f-wpR","f-resp","f-notas"].forEach(id=>{const e=document.getElementById(id);if(e)e.value="";});}
function saveAluno(){
  const nome=document.getElementById("f-nome").value.trim();
  const wp=document.getElementById("f-wp").value.trim();
  if(!nome){alert("Nome é obrigatório!");return;}
  if(!wp){alert("WhatsApp é obrigatório!");return;}
  students.push({id:nextId(),nome,idade:parseInt(document.getElementById("f-idade").value)||null,
    wp,wpR:document.getElementById("f-wpR").value.trim(),
    resp:document.getElementById("f-resp").value.trim()||"O próprio",
    notas:document.getElementById("f-notas").value.trim(),warn:false,
    aulas:[{f:false,d:"",h:""},{f:false,d:"",h:""},{f:false,d:"",h:""}]});
  saveToSheets();closeModal();render();
}
function toggleSel(id){selId=selId===id?null:id;render();}

function fichaView(s){
  if(!s.fichaCompleta)return "";
  const row=(lbl,val)=>val?`<div class="ficha-row"><span class="ficha-lbl">${lbl}</span><span class="ficha-val">${val}</span></div>`:"";
  return `<div class="ficha-box">
    <div class="ficha-title">📋 Ficha Digital Preenchida</div>
    <div class="ficha-grid">
      ${row("E-mail",s.email)}
      ${row("Profissão",s.profissao)}
      ${row("Nascimento",s.dataNasc)}
      ${row("Bairro",s.bairro)}
      ${row("Como soube",s.comoSoube+(s.quemIndicou?" · "+s.quemIndicou:""))}
      ${row("Praticou JJ?",s.jaJJ==="sim"?"Sim"+(s.qualJJ?" — "+s.qualJJ:""):"Não")}
      ${row("Atividade física",s.ativFisica==="sim"?"Sim"+(s.qualAtiv?" — "+s.qualAtiv:""):"Não")}
      ${row("Objetivos",s.objetivos)}
    </div>
    ${s.expectativa?`<div style="font-size:11px;margin-top:8px;color:var(--text2)"><span style="color:var(--text3);font-weight:700;font-size:10px;text-transform:uppercase">Expectativas: </span>${s.expectativa}</div>`:""}
  </div>`;}

function render(){
  const counts=[0,1,2,3].map(n=>students.filter(s=>stg(s)===n).length);
  document.getElementById("stats").innerHTML=`
    <div class="stat"><div class="stat-val">${students.length}</div><div class="stat-lbl">Total</div></div>
    <div class="stat s0"><div class="stat-val">${counts[0]}</div><div class="stat-lbl">Sem aula</div></div>
    <div class="stat s1"><div class="stat-val">${counts[1]}</div><div class="stat-lbl">Aguard. 2ª</div></div>
    <div class="stat s2"><div class="stat-val">${counts[2]}</div><div class="stat-lbl">Aguard. 3ª</div></div>
    <div class="stat s3"><div class="stat-val">${counts[3]}</div><div class="stat-lbl">Matrícula</div></div>`;
  const fs=getFiltered();
  if(!fs.length){document.getElementById("list").innerHTML="<div class=\"empty\">Nenhum aluno encontrado.</div>";return;}
  let html="";
  fs.forEach(s=>{
    const st=stg(s),isOpen=selId===s.id;
    if(!msgTypes[s.id])msgTypes[s.id]=st===0?"agendar":st===1?"pos1":st===2?"pos2":"pos3";
    const lastD=s.aulas.filter(a=>a.f&&a.d).map(a=>a.d).sort().reverse()[0]||null;
    const dots=s.aulas.map((a,i)=>`<div class="dot${a.f?" ok":a.d?" sch":""}">${a.f?"✓":i+1}</div>`).join("");
    html+=`<div class="sc${isOpen?" open":""}" onclick="toggleSel(${s.id})">
      <div class="sc-inner">
        <div class="av ${AVC[st]}">${ini(s.nome)}</div>
        <div class="si">
          <div class="sn">${s.nome}
            <span class="badge ${BC[st]}">${SL[st]}</span>
            ${s.warn?"<span class=\"badge bw\">⚠</span>":""}
            ${s.fichaCompleta?"<span class=\"badge bficha\">📋</span>":""}
          </div>
          <div class="sd">${s.resp}${s.wp?" · "+s.wp:""}${lastD?" · última: "+lastD:""}</div>
        </div>
        <div class="dots">${dots}</div>
        <svg class="chv${isOpen?" up":""}" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
      </div></div>`;
    if(isOpen){
      const al=ALERTS[st],mt=msgTypes[s.id];
      const ah=s.aulas.map((a,i)=>{
        const dk=`d-${s.id}-${i}`,hk=`h-${s.id}-${i}`;
        if(a.f)return`<div class="abox"><div class="at">${i+1}ª Aula</div>
          <div style="font-size:12px;font-weight:700;color:var(--green-t)">✓ Realizada</div>
          <div style="font-size:11px;color:var(--text3);margin:2px 0 5px">${a.d||"data pendente"} ${a.h}</div>
          <button class="btn btn-del" onclick="event.stopPropagation();markAula(${s.id},${i},false,'','')">✕ Desfazer</button></div>`;
        if(a.d)return`<div class="abox"><div class="at">${i+1}ª Aula</div>
          <div style="font-size:12px;font-weight:700;color:var(--blue-t)">📅 Agendada</div>
          <div style="font-size:11px;color:var(--text3);margin:2px 0 5px">${a.d} ${a.h}</div>
          <button class="btn btn-ok" onclick="event.stopPropagation();markAula(${s.id},${i},true,'${a.d}','${a.h}')">✓ Confirmar</button></div>`;
        return`<div class="abox"><div class="at">${i+1}ª Aula</div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:6px">Pendente</div>
          <input class="inp" id="${dk}" type="text" placeholder="DD/MM" onclick="event.stopPropagation()">
          <input class="inp" id="${hk}" type="text" placeholder="Horário" onclick="event.stopPropagation()">
          <button class="btn btn-ok" onclick="event.stopPropagation();doMark(${s.id},${i},'${dk}','${hk}')">✓ Feita</button></div>`;
      }).join("");
      const opts=[["agendar","Agendar 1ª aula"],["pos1","Após 1ª → 2ª"],["pos2","Após 2ª → 3ª (última!)"],
        ["pos3","Após 3ª → Fechar matrícula"],["lembrete","Lembrete véspera"],["followup","Follow-up"]
      ].map(([v,l])=>`<option value="${v}"${mt===v?" selected":""}>${l}</option>`).join("");
      const isCop=copiedId===s.id;
      html+=`<div class="panel" onclick="event.stopPropagation()">
        <div class="pname">${s.nome}${s.idade?" · "+s.idade+" anos":""}</div>
        <div class="pinfo">
          <strong>Resp:</strong> ${s.resp}<br>
          ${s.wp?"📱 "+s.wp:""} ${s.wpR?" · Resp: "+s.wpR:""}
          ${s.email?`<br>✉️ ${s.email}`:""}
        </div>
        ${s.notas?`<div class="pobs">${s.warn?"⚠ ":""}${s.notas}</div>`:""}
        ${fichaView(s)}
        <div class="alert-box ${al.cls}">${al.txt}</div>
        <div class="slbl2">Controle de aulas</div>
        <div class="agrid">${ah}</div>
        <div class="slbl2">Mensagem WhatsApp</div>
        <select onchange="msgTypes[${s.id}]=this.value;render()">${opts}</select>
        <div class="msgbox">${buildMsg(s,mt)}</div>
        <div class="btn-row">
          <button class="btn btn-copy${isCop?" copied":""}" onclick="copyMsg(${s.id},'${mt}')">${isCop?"✓ Copiado!":"📋 Copiar"}</button>
          ${s.wp?`<a href="https://wa.me/55${s.wp.replace(/\D/g,"")}" target="_blank" rel="noopener" style="text-decoration:none"><button class="btn" onclick="event.stopPropagation()">💬 WhatsApp</button></a>`:""}
        </div>
      </div>`;
    }
  });
  document.getElementById("list").innerHTML=html;
}

// Init
initTheme();
const ss2=localStorage.getItem(LS2)||"status";
sortBy=ss2;
const sb=document.getElementById("s"+ss2[0]);
if(sb){document.querySelectorAll(".sbtn").forEach(b=>b.classList.remove("on"));sb.classList.add("on");}
try{const d=localStorage.getItem(SK);if(d)students=JSON.parse(d);}catch(e){}
if(students.length>0)render();
loadFromSheets();
</script>
</body>
</html>
